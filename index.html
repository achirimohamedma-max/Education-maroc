<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرستي عن بعد</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔷 HEADER -->
<nav class="topbar">

  <div class="right">
    <h3>وزارة التربية الوطنية والتعليم الأولي والرياضة</h3>
  </div>

  <div class="center">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Coat_of_arms_of_Morocco.png" class="coat">
  </div>

  <div class="left">
    👨‍🏫 الأستاذ محمد العشيري
  </div>

</nav>

<!-- 🔷 الصفحة الرئيسية -->
<section class="home">

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="avatar">

  <h1>مدرستي عن بعد</h1>

  <p>منصة رقمية لدعم التعليم الابتدائي</p>

  <button onclick="goLevels()" class="start-btn">
    🚀 ابدأ التعلم
  </button>

</section>

<!-- 🔷 المستويات -->
<section id="levels" class="levels">

  <h2>🎯 اختر المستوى</h2>
<h2 id="question"></h2>
<div id="answers"></div>
  <div class="grid">

    <div class="card c1" onclick="startLevel(1)">الأول ابتدائي</div>
    <div class="card c2" onclick="startLevel(2)">الثاني ابتدائي</div>
    <div class="card c3" onclick="startLevel(3)">الثالث ابتدائي</div>
    <div class="card c4" onclick="startLevel(4)">الرابع ابتدائي</div>
    <div class="card c5" onclick="startLevel(5)">الخامس ابتدائي</div>
    <div class="card c6" onclick="startLevel(6)">السادس ابتدائي</div>

  </div>

</section>

<script>
function goLevels(){
  document.querySelector(".home").style.display="none";
  document.querySelector("#levels").style.display="block";
}

function startLevel(level){
  alert("تم اختيار المستوى " + level);
}
</script>

</body>
</html>
