<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرستي عن بعد</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1e293b;
font-size:12px;
}

.left{width:33%; text-align:left;}
.center{width:33%; text-align:center;}
.right{width:33%; text-align:right;}

.logo{width:50px;}

/* HERO */
.hero{padding:20px;}

.ministry{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:20px;
margin-bottom:20px;
}

.avatar{
width:120px;
border-radius:50%;
background:white;
padding:10px;
}

.subtitle{color:#facc15;}

.desc{
max-width:320px;
margin:auto;
line-height:1.6;
}

/* LEVELS */
.levels{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
padding:10px;
}

.levels button{
padding:15px;
border:none;
border-radius:20px;
color:white;
font-size:16px;
cursor:pointer;
}

/* ألوان المستويات */
.lvl1{background:#22c55e;}
.lvl2{background:#3b82f6;}
.lvl3{background:#a855f7;}
.lvl4{background:#f97316;}
.lvl5{background:#ef4444;}
.lvl6{background:#0f172a;}

/* QUIZ */
#quiz{display:none;}

#question{
font-size:32px;
margin:20px;
font-weight:bold;
}

/* answers grid */
#answers{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.answer{
padding:25px;
font-size:20px;
border:none;
border-radius:15px;
background:white;
color:black;
cursor:pointer;
}

/* feedback */
.correct{
background:#22c55e !important;
color:white;
}

.wrong{
background:#ef4444 !important;
color:white;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="left">👨‍🏫 الأستاذ محمد العشيري</div>

<div class="center">
<img src="شعار_وزارة_التربية_الوطنية_والتعليم_الأولي_والرياضة.png" class="logo">
</div>

<div class="right">
وزارة التربية الوطنية والتعليم الأولي والرياضة
</div>
</div>

<!-- HOME -->
<div id="home">
<div class="hero">

<div class="ministry">🏛️ المملكة المغربية</div>

<img src="pngtree-schoolboy-with-books-thumbs-up-graphic-png-image_16327512.png" class="avatar">

<h1>مدرستي عن بعد 📚</h1>
<h3 class="subtitle">التعليم الابتدائي الرقمي</h3>

<p class="desc">
منصة رقمية مكملة للمدرسة المغربية الابتدائية لدعم تعلم أبنائنا
</p>

<div class="levels">
<button class="lvl1" onclick="startLevel(1)">المستوى الأول</button>
<button class="lvl2" onclick="startLevel(2)">المستوى الثاني</button>
<button class="lvl3" onclick="startLevel(3)">المستوى الثالث</button>
<button class="lvl4" onclick="startLevel(4)">المستوى الرابع</button>
<button class="lvl5" onclick="startLevel(5)">المستوى الخامس</button>
<button class="lvl6" onclick="startLevel(6)">المستوى السادس</button>
</div>

</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="quiz">
  <div class="quiz-box">
    <h2 id="question"></h2>
    <div id="answers"></div>
  </div>
</div> 

<script>

/* QUESTIONS */
const levels = {
1:[
{q:"2+1=?",correct:3},{q:"5-2=?",correct:3},{q:"3+2=?",correct:5},
{q:"6-3=?",correct:3},{q:"1+4=?",correct:5},{q:"7-5=?",correct:2},
{q:"2+3=?",correct:5},{q:"8-6=?",correct:2},{q:"4+1=?",correct:5},{q:"9-7=?",correct:2}
],
2:[
{q:"9+5=?",correct:14},{q:"12-4=?",correct:8},{q:"8+7=?",correct:15},
{q:"15-6=?",correct:9},{q:"6+9=?",correct:15},{q:"14-5=?",correct:9},
{q:"7+8=?",correct:15},{q:"13-7=?",correct:6},{q:"5+9=?",correct:14},{q:"11-3=?",correct:8}
],
3:[
{q:"23+9=?",correct:32},{q:"21-8=?",correct:13},{q:"3×4=?",correct:12},
{q:"15+7=?",correct:22},{q:"30-12=?",correct:18},{q:"5×3=?",correct:15},
{q:"18+6=?",correct:24},{q:"25-9=?",correct:16},{q:"4×6=?",correct:24},{q:"27+5=?",correct:32}
],
4:[
{q:"52-27=?",correct:25},{q:"34×3=?",correct:102},{q:"61-38=?",correct:23},
{q:"45×2=?",correct:90},{q:"70-46=?",correct:24},{q:"28×3=?",correct:84},
{q:"80-59=?",correct:21},{q:"36×4=?",correct:144},{q:"65-27=?",correct:38},{q:"49×2=?",correct:98}
],
5:[
{q:"123×3=?",correct:369},{q:"144÷12=?",correct:12},{q:"205×2=?",correct:410},
{q:"96÷8=?",correct:12},{q:"312×3=?",correct:936},{q:"81÷9=?",correct:9},
{q:"150×4=?",correct:600},{q:"72÷6=?",correct:12},{q:"211×2=?",correct:422},{q:"64÷8=?",correct:8}
],
6:[
{q:"123×12=?",correct:1476},{q:"144÷12=?",correct:12},{q:"215×13=?",correct:2795},
{q:"256÷16=?",correct:16},{q:"132×11=?",correct:1452},{q:"300÷15=?",correct:20},
{q:"111×12=?",correct:1332},{q:"420÷20=?",correct:21},{q:"250×14=?",correct:3500},{q:"900÷30=?",correct:30}
]
};

/* LOGIC */
let current=0;
let currentLevel=1;
let score=0;

function startLevel(level){
currentLevel=level;
current=0;
score=0;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="flex"; 

showQuestion();
}

function showQuestion(){

let q=levels[currentLevel][current];
document.getElementById("question").innerText=q.q;

let answers=document.getElementById("answers");
answers.innerHTML="";

let correct=q.correct;
let wrong=[];

while(wrong.length<3){
let rand=correct + Math.floor(Math.random()*5 -2);
if(rand!==correct && rand>0 && !wrong.includes(rand)){
wrong.push(rand);
}
}

let all=[correct,...wrong].sort(()=>Math.random()-0.5);

all.forEach(ans=>{
let btn=document.createElement("button");
btn.className="answer";
btn.innerText=ans;

btn.onclick=()=>{

let buttons=document.querySelectorAll(".answer");
buttons.forEach(b=>b.disabled=true);

if(ans===correct){
btn.classList.add("correct");
score++;
}else{
btn.classList.add("wrong");
}

setTimeout(()=>{next();},500);

};

answers.appendChild(btn);
});
}

function next(){
current++;

if(current<levels[currentLevel].length){
showQuestion();
}else{
showResult();
}
}

function showResult(){

let total = levels[currentLevel].length;

let message =
score >= 8 ? "🔥 ممتاز جدا!" :
score >=5 ? "👍 عمل جيد!" :
"💪 حاول مرة أخرى";

document.getElementById("quiz").innerHTML = `
<div class="result">

<h2>🏁 انتهى المستوى</h2>

<div class="score">${score} / ${total}</div>

<div class="message">${message}</div>

<button onclick="goHome()">🏠 الرجوع للرئيسية</button>

</div>
`;

}

function goHome(){
location.reload();
}

</script>

</body>
</html>
