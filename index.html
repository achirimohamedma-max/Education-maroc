<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرستي</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header -->
<div class="header">
<h1>📚 مدرستي عن بعد</h1>
<p>اختر المستوى 🎯</p>
</div>

<!-- Levels -->
<section id="map">

<div class="levels">

<button class="level-btn lvl1" onclick="goLevel(1)">🟢 الأول ابتدائي</button>
<button class="level-btn lvl2" onclick="goLevel(2)">🔵 الثاني ابتدائي</button>
<button class="level-btn lvl3" onclick="goLevel(3)">🟣 الثالث ابتدائي</button>
<button class="level-btn lvl4" onclick="goLevel(4)">🟠 الرابع ابتدائي</button>
<button class="level-btn lvl5" onclick="goLevel(5)">🔴 الخامس ابتدائي</button>
<button class="level-btn lvl6" onclick="goLevel(6)">⚫ السادس ابتدائي</button>

</div>

</section>

<!-- Quiz -->
<section id="quiz" style="display:none;">

<div class="quiz-card">

<h2 id="question"></h2>

<div id="answers"></div>

<div class="nav-buttons">
<button onclick="backToMap()">⬅ رجوع</button>
<button onclick="goHome()">🏠 الرئيسية</button>
</div>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
