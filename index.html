<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدرستي عن بعد</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<nav class="topbar">
  <div class="brand">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Flag_of_Morocco.svg" class="flag">
    <div>
      <h2>مدرستي عن بعد</h2>
      <span>التعليم الابتدائي</span>
    </div>
  </div>

  <div class="menu">
    <button onclick="navigate('home')">الرئيسية</button>
    <button onclick="navigate('levels')">المستويات</button>
  </div>
</nav>

<!-- Home -->
<section id="home" class="page active home-container">
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Ministry_of_National_Education_Morocco_logo.png" class="ministry-logo">

  <div class="hero">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="hero-img">
    <h1>مدرستي عن بعد</h1>
    <p>منصة رقمية لدعم التعلّم الابتدائي</p>
    <button id="startBtn" class="start-btn">🚀 ابدأ التعلم</button>
  </div>
</section>

<!-- Levels -->
<section id="levels" class="page">
  <h2>🎯 اختر المستوى</h2>

  <div class="levels-grid">

    <div class="level-card" onclick="navigate('level1')">
      الأول ابتدائي
      <div class="badge" id="badge-level1">🔒</div>
    </div>

    <div class="level-card" onclick="navigate('level2')">
      الثاني ابتدائي
      <div class="badge" id="badge-level2">🔒</div>
    </div>

    <div class="level-card" onclick="navigate('level3')">
      الثالث ابتدائي

    </div>

    <div class="level-card" onclick="navigate('level4')">
      الرابع ابتدائي
      <div class="badge" id="badge-level4">🔒</div>
    </div>

    <div class="level-card" onclick="navigate('level5')">
      الخامس ابتدائي
      <div class="badge" id="badge-level5">🔒</div>
    </div>

    <div class="level-card" onclick="navigate('level6')">
      السادس ابتدائي
      <div class="badge" id="badge-level6">🔒</div>
    </div>

  </div>
</section>

<!-- Quiz pages -->
<section id="level1" class="page"><div class="quiz">
<div class="progress"><div class="progress-bar"></div></div>
<h3 class="question"></h3>
<div class="answers"></div>
<p class="result"></p>
<p class="score"></p>

</div></section>
