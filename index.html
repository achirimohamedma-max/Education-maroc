<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدرستي عن بعد</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar">
  <h2>مدرستي</h2>
  <div>
    <button onclick="navigate('home')">الرئيسية</button>
    <button onclick="navigate('levels')">المستويات</button>
    <button onclick="navigate('about')">حول</button>
  </div>
</nav>

<!-- 🔷 الصفحات -->
<main>

  <!-- 🏠 الصفحة الرئيسية -->
  <section id="home" class="page active">
    <h1>📚 مدرستي عن بعد</h1>
    <p>منصة رقمية للتعليم الابتدائي</p>
    <button onclick="navigate('levels')" class="primary">ابدأ الآن</button>
  </section>

  <!-- 🎓 المستويات -->
  <section id="levels" class="page">
    <h2>اختر المستوى</h2>

    <div class="grid">
      <button onclick="navigate('level1')">الأول ابتدائي</button>
      <button onclick="navigate('level2')">الثاني ابتدائي</button>
      <button onclick="navigate('level3')">الثالث ابتدائي</button>
      <button onclick="navigate('level4')">الرابع ابتدائي</button>
      <button onclick="navigate('level5')">الخامس ابتدائي</button>
      <button onclick="navigate('level6')">السادس ابتدائي</button>
    </div>
  </section>

  <!-- 📘 مستوى -->
  <section id="level1" class="page">
    <h2>الأول ابتدائي</h2>
    <div class="quiz">
  <h3>كم حاصل 2 + 2 ؟</h3>

  <button onclick="answer(4)">4</button>
  <button onclick="answer(3)">3</button>
  <button onclick="answer(5)">5</button>

  <p id="result"></p>
  <p id="score">النقاط: 0</p>
    </div>
    <button onclick="navigate('levels')">⬅ رجوع</button>
  </section>

  <section id="level2" class="page">
    <h2>الثاني ابتدائي</h2>
    <button onclick="navigate('levels')">⬅ رجوع</button>
  </section>

  <section id="level3" class="page">
    <h2>الثالث ابتدائي</h2>
    <button onclick="navigate('levels')">⬅ رجوع</button>
  </section>

  <!-- ℹ️ حول -->
  <section id="about" class="page">
    <h2>حول المنصة</h2>
    <p>مشروع تعليمي لدعم التلاميذ</p>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
