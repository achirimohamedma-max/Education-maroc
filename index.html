<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مدرستي 🎮</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="xp-box">⭐ <span id="xp">0</span></div>
  <div class="level-box">🎮 Level <span id="playerLevel">1</span></div>
</div>

<!-- HUD -->
<div class="hud">
  <div class="hearts">❤️ <span id="lives">3</span></div>
  <div class="mission">🎯 المهمة: أجب على 5 أسئلة صحيحة</div>
</div>

<!-- MAP -->
<section id="map" class="map">
  <h2>🎯 مسار التعلم</h2>

  <div class="path">
    <div class="node done" onclick="startLevel(1)">1</div>
    <div class="line"></div>

    <div class="node" id="lvl2" onclick="goLevel(2)">2</div>
    <div class="line"></div>

    <div class="node" id="lvl3" onclick="goLevel(3)">3</div>
    <div class="line"></div>

    <div class="node" id="lvl4" onclick="goLevel(4)">4</div>
    <div class="line"></div>

    <div class="node" id="lvl5" onclick="goLevel(5)">5</div>
    <div class="line"></div>

    <div class="node" id="lvl6" onclick="goLevel(6)">6</div>
  </div>
</section>

<!-- QUIZ -->
<section id="quiz" class="quiz-section">
  <!-- Progress -->
  <div class="progress">
    <div id="progressBar"></div>
  </div>

  <!-- Timer -->
  <div class="timer">⏱️ <span id="timer">10</span></div>

  <!-- Card -->
  <div class="card">
    <h2 id="question"></h2>
    <div id="answers"></div>
  </div>

  <button class="back-btn" onclick="backToMap()">⬅ رجوع</button>
</section>

<!-- Sounds -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script src="app.js"></script>
</body>
</html>
