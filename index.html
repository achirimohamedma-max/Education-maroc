<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرستي عن بعد</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1e293b;
font-size:12px;
}

.left{width:33%; text-align:left;}
.center{width:33%; text-align:center;}
.right{width:33%; text-align:right;}

.logo{width:50px;}

/* HERO */
.hero{padding:20px;}

.ministry{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:20px;
margin-bottom:20px;
}

.avatar{
width:120px;
border-radius:50%;
background:white;
padding:10px;
}

.subtitle{color:#facc15;}

.desc{
max-width:320px;
margin:auto;
line-height:1.6;
}

/* LEVELS */
.levels{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
padding:10px;
}

.levels button{
padding:15px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.2);
color:white;
font-size:16px;
cursor:pointer;
}

.levels button:hover{
background:#22c55e;
}

/* QUIZ */
#quiz{display:none;}

.answer{
display:block;
margin:10px auto;
padding:12px;
width:70%;
border:none;
border-radius:10px;
font-size:16px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="left">👨‍🏫 الأستاذ محمد العشيري</div>

<div class="center">
<img src="شعار_وزارة_التربية_الوطنية_والتعليم_الأولي_والرياضة.png" class="logo">
</div>

<div class="right">
وزارة التربية الوطنية والتعليم الأولي والرياضة
</div>
</div>

<!-- HOME -->
<div id="home">

<div class="hero">

<div class="ministry">🏛️ المملكة المغربية</div>

<img src="pngtree-schoolboy-with-books-thumbs-up-graphic-png-image_16327512.png" class="avatar">

<h1>مدرستي عن بعد 📚</h1>

<h3 class="subtitle">التعليم الابتدائي الرقمي</h3>

<p class="desc">
منصة رقمية مكملة للمدرسة المغربية الابتدائية لدعم تعلم أبنائنا
</p>

<div class="levels">
<button onclick="startLevel(1)">المستوى الأول</button>
<button onclick="startLevel(2)">المستوى الثاني</button>
<button onclick="startLevel(3)">المستوى الثالث</button>
<button onclick="startLevel(4)">المستوى الرابع</button>
<button onclick="startLevel(5)">المستوى الخامس</button>
<button onclick="startLevel(6)">المستوى السادس</button>
</div>

</div>

</div>

<!-- QUIZ -->
<div id="quiz">
<h2 id="question"></h2>
<div id="answers"></div>
<button onclick="goHome()">⬅ رجوع</button>
</div>

<script>

/* -------------------- QUESTIONS -------------------- */

const levels = {

{q:"7-5=?",a:[1,2,3],correct:2},
{q:"2+3=?",a:[4,5,6],correct:5},
{q:"8-6=?",a:[1,2,3],correct:2},
{q:"4+1=?",a:[4,5,6],correct:5},
{q:"9-7=?",a:[1,2,3],correct:2}
],

2:[
{q:"9+5=?",a:[13,14,15],correct:14},
{q:"12-4=?",a:[6,7,8],correct:8},
{q:"8+7=?",a:[14,15,16],correct:15},
{q:"15-6=?",a:[8,9,10],correct:9},
{q:"6+9=?",a:[14,15,16],correct:15},
{q:"14-5=?",a:[8,9,10],correct:9},
{q:"7+8=?",a:[14,15,16],correct:15},
{q:"13-7=?",a:[5,6,7],correct:6},
{q:"5+9=?",a:[13,14,15],correct:14},
{q:"11-3=?",a:[7,8,9],correct:8}

3:[
{q:"23+9=?",a:[31,32,33],correct:32},

{q:"18+6=?",a:[23,24,25],correct:24},
{q:"25-9=?",a:[15,16,17],correct:16},
{q:"4×6=?",a:[22,23,24],correct:24},
{q:"27+5=?",a:[31,32,33],correct:32}

4:[

5:[

{q:"256÷16=?",a:[14,15,16],correct:16},

{q:"300÷15=?",a:[18,19,20],correct:20},
{q:"111×12=?",a:[1322,1332,1342],correct:1332},
{q:"420÷20=?",a:[20,21,22],correct:21},
{q:"250×14=?",a:[3400,3500,3600],correct:3500},
{q:"900÷30=?",a:[28,29,30],correct:30}
]

};

/* -------------------- LOGIC -------------------- */

let current=0;
let currentLevel=1;

function startLevel(level){
currentLevel=level;
current=0;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();
}

function showQuestion(){
let q=levels[currentLevel][current];

document.getElementById("question").innerText=q.q;

let answers=document.getElementById("answers");
answers.innerHTML="";

q.a.forEach(ans=>{
let btn=document.createElement("button");
btn.className="answer";
btn.innerText=ans;

btn.onclick=()=>{
next();
};

answers.appendChild(btn);
});
}

function next(){
current++;

if(current<levels[currentLevel].length){
showQuestion();
}else{
alert("🏁 انتهى المستوى");
goHome();
}
}

function goHome(){
document.getElementById("home").style.display="block";
document.getElementById("quiz").style.display="none";
}

</script>

</body>
</html>
